<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIK TOOLS - Ultimate Utility Suite</title>
    <!-- Open Source Library for PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Color Variables for Themes */
        :root {
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --panel-bg: #ffffff;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: #e5e7eb;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Super AMOLED Dark Mode */
        [data-theme="amoled"] {
            --bg-color: #000000;         /* True black for AMOLED pixel saving */
            --text-color: #f3f4f6;
            --panel-bg: #121212;         /* Slight offset for containers to be visible */
            --primary-color: #60a5fa;
            --primary-hover: #3b82f6;
            --border-color: #333333;
            --shadow: 0 4px 6px -1px rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }

        /* Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--panel-bg);
            box-shadow: var(--shadow);
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn, .theme-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background-color: transparent;
            color: var(--text-color);
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .nav-btn:hover, .theme-btn:hover {
            background-color: var(--border-color);
        }

        .nav-btn.active {
            background-color: var(--primary-color);
            color: #fff;
        }

        /* App Layout */
        .app-layout {
            display: flex;
            height: calc(100vh - 67px);
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .sidebar .nav-btn {
            text-align: left;
            width: 100%;
        }
        .sidebar-category {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--primary-color);
            font-weight: bold;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
        }

        /* Layout */
        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .tool-section {
            display: none;
            background-color: var(--panel-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            animation: fadeIn 0.4s ease-in-out;
        }

        .tool-section.active {
            display: block;
        }

        h2 { margin-bottom: 0.5rem; }
        p { margin-bottom: 1.5rem; opacity: 0.8; }

        .input-group {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .controls label {
            display: flex;
            flex-direction: column;
            font-weight: 600;
            gap: 0.5rem;
        }

        input[type="number"], input[type="file"] {
            padding: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        .action-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            width: 100%;
        }

        .action-btn:hover { background-color: var(--primary-hover); }

        .status-msg { margin-top: 1rem; font-weight: bold; color: var(--primary-color); }

        /* Calculator UI */
        .calc-wrapper {
            max-width: 400px;
            margin: 0 auto;
        }

        #calc-display {
            width: 100%;
            padding: 1rem;
            font-size: 1.5rem;
            text-align: right;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .calc-btn {
            padding: 1rem;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: 0.2s;
            border: 1px solid var(--border-color);
        }

        .calc-btn:hover { background-color: var(--border-color); }
        .calc-btn.op { background-color: rgba(59, 130, 246, 0.2); color: var(--primary-color); font-weight: bold;}
        .calc-btn.clear { background-color: #ef4444; color: white; }
        .calc-btn.equal { background-color: var(--primary-color); color: white; }

        /* Tool Utility Classes */
        .tool-textarea {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            resize: vertical;
            font-family: inherit;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .result-box { padding: 1rem; background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 6px; min-height: 50px; word-break: break-all; }
        .box-shadow-preview { width: 150px; height: 150px; background-color: var(--primary-color); margin: 2rem auto; border-radius: 12px; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 1rem; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .app-layout { flex-direction: column; overflow: visible; height: auto; }
            .sidebar { width: 100%; height: auto; max-height: 250px; border-right: none; border-bottom: 1px solid var(--border-color); }
            .main-content { overflow: visible; padding: 1rem; margin: 0; }
            .calc-btn { padding: 0.8rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">NIK TOOLS</div>
        <div class="nav-links">
            <button class="nav-btn active" data-target="img-to-pdf">Image to PDF</button>
            <button class="nav-btn" data-target="img-compress">Image Compressor</button>
            <button class="nav-btn" data-target="calculator">Scientific Calculator</button>
            <button id="theme-toggle" class="theme-btn">🌙 AMOLED Mode</button>
        </div>
    </nav>

    <main class="container">
        <!-- TOOL 1: Image to PDF -->
        <section id="img-to-pdf" class="tool-section active">
            <h2>Images to Single PDF</h2>
            <p>Select multiple JPG or PNG files to combine them into a single PDF document.</p>
            <div class="input-group">
                <input type="file" id="pdf-images" accept="image/png, image/jpeg" multiple>
            </div>
            <button id="generate-pdf-btn" class="action-btn">Convert to PDF</button>
            <p id="pdf-status" class="status-msg"></p>
        </section>

        <!-- TOOL 2: Image Compressor & Resizer -->
        <section id="img-compress" class="tool-section">
            <h2>Image Compressor & Resizer</h2>
            <p>Reduce the file size and dimensions of your images right in the browser.</p>
            <div class="input-group">
                <input type="file" id="compress-image" accept="image/png, image/jpeg">
            </div>
            <div class="controls">
                <label>Quality: <span id="quality-val">80%</span>
                    <input type="range" id="img-quality" min="10" max="100" value="80">
                </label>
                <label>Width (px):
                    <input type="number" id="img-width" placeholder="e.g. 800">
                </label>
            </div>
            <button id="compress-btn" class="action-btn">Compress & Download</button>
            <div id="compress-preview"></div>
        </section>

        <!-- TOOL 3: Scientific Calculator -->
        <section id="calculator" class="tool-section">
            <h2>Scientific Calculator</h2>
            <div class="calc-wrapper">
                <input type="text" id="calc-display" disabled>
                <div class="calc-grid">
                    <button class="calc-btn func" onclick="calcAction('sin(')">sin</button>
                    <button class="calc-btn func" onclick="calcAction('cos(')">cos</button>
                    <button class="calc-btn func" onclick="calcAction('tan(')">tan</button>
                    <button class="calc-btn clear" onclick="calcClear()">AC</button>
                    
                    <button class="calc-btn func" onclick="calcAction('Math.log10(')">log</button>
                    <button class="calc-btn func" onclick="calcAction('Math.sqrt(')">√</button>
                    <button class="calc-btn func" onclick="calcAction('**')">x^y</button>
                    <button class="calc-btn op" onclick="calcAction('/')">÷</button>
                    
                    <button class="calc-btn num" onclick="calcAction('7')">7</button>
                    <button class="calc-btn num" onclick="calcAction('8')">8</button>
                    <button class="calc-btn num" onclick="calcAction('9')">9</button>
                    <button class="calc-btn op" onclick="calcAction('*')">×</button>
                    
                    <button class="calc-btn num" onclick="calcAction('4')">4</button>
                    <button class="calc-btn num" onclick="calcAction('5')">5</button>
                    <button class="calc-btn num" onclick="calcAction('6')">6</button>
                    <button class="calc-btn op" onclick="calcAction('-')">-</button>
                    
                    <button class="calc-btn num" onclick="calcAction('1')">1</button>
                    <button class="calc-btn num" onclick="calcAction('2')">2</button>
                    <button class="calc-btn num" onclick="calcAction('3')">3</button>
                    <button class="calc-btn op" onclick="calcAction('+')">+</button>
                    
                    <button class="calc-btn num" onclick="calcAction('0')">0</button>
                    <button class="calc-btn num" onclick="calcAction('.')">.</button>
                    <button class="calc-btn func" onclick="calcAction(')')">)</button>
                    <button class="calc-btn equal" onclick="calcEval()">=</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- THEME & TAB SWITCHING LOGIC ---
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        themeToggle.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'amoled') {
                body.removeAttribute('data-theme');
                themeToggle.textContent = '🌙 AMOLED Mode';
            } else {
                body.setAttribute('data-theme', 'amoled');
                themeToggle.textContent = '☀️ Light Mode';
            }
        });

        const navBtns = document.querySelectorAll('.nav-btn');
        const toolSections = document.querySelectorAll('.tool-section');

        navBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all
                navBtns.forEach(b => b.classList.remove('active'));
                toolSections.forEach(s => s.classList.remove('active'));
                
                // Add active to clicked
                btn.classList.add('active');
                const targetId = btn.getAttribute('data-target');
                document.getElementById(targetId).classList.add('active');
            });
        });

        // --- TOOL 1: IMAGE TO PDF CONVERTER ---
        document.getElementById('generate-pdf-btn').addEventListener('click', async () => {
            const files = document.getElementById('pdf-images').files;
            const statusText = document.getElementById('pdf-status');
            
            if (files.length === 0) {
                statusText.textContent = "Please select at least one image!";
                return;
            }

            statusText.textContent = "Generating PDF... Please wait.";
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const imgData = await readFileAsDataURL(file);
                
                // Get image dimensions
                const img = new Image();
                img.src = imgData;
                await new Promise(resolve => img.onload = resolve);
                
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (img.height * pdfWidth) / img.width;

                if (i > 0) pdf.addPage();
                pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
            }

            pdf.save("NIK_TOOLS_Converted.pdf");
            statusText.textContent = "PDF Downloaded Successfully!";
        });

        // Helper for reading files
        function readFileAsDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // --- TOOL 2: IMAGE COMPRESSOR & RESIZER ---
        const qualitySlider = document.getElementById('img-quality');
        const qualityVal = document.getElementById('quality-val');

        qualitySlider.addEventListener('input', (e) => {
            qualityVal.textContent = e.target.value + '%';
        });

        document.getElementById('compress-btn').addEventListener('click', () => {
            const fileInput = document.getElementById('compress-image');
            if (fileInput.files.length === 0) {
                alert("Please select an image first.");
                return;
            }

            const file = fileInput.files[0];
            const quality = parseInt(qualitySlider.value) / 100;
            const userWidth = document.getElementById('img-width').value;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    // Calculate new dimensions
                    let newWidth = userWidth ? parseInt(userWidth) : img.width;
                    let newHeight = (img.height / img.width) * newWidth;

                    canvas.width = newWidth;
                    canvas.height = newHeight;

                    // Draw and compress
                    ctx.drawImage(img, 0, 0, newWidth, newHeight);
                    
                    // Output format (forces jpeg for compression features)
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);

                    // Trigger Download
                    const link = document.createElement('a');
                    link.download = `NIK_Compressed_${file.name}`;
                    link.href = compressedDataUrl;
                    link.click();
                }
            }
            reader.readAsDataURL(file);
        });

        // --- TOOL 3: SCIENTIFIC CALCULATOR ---
        let calcExpression = "";
        const calcDisplay = document.getElementById('calc-display');

        function calcAction(val) {
            calcExpression += val;
            // Visually replace Math. functions for user friendly display
            let displayStr = calcExpression
                .replace(/Math\.log10\(/g, 'log(')
                .replace(/Math\.sqrt\(/g, '√(')
                .replace(/\*\*/g, '^');
            calcDisplay.value = displayStr;
        }

        function calcClear() {
            calcExpression = "";
            calcDisplay.value = "";
        }

        function calcEval() {
            try {
                // Safe evaluation for basic math expressions
                const result = new Function('return ' + calcExpression)();
                
                // Prevent undefined or NaN from showing weirdly
                if(result === undefined || Number.isNaN(result)) throw new Error("Invalid");
                
                calcDisplay.value = result;
                calcExpression = result.toString();
            } catch (error) {
                calcDisplay.value = "Error";
                calcExpression = "";
            }
        }
    </script>
</body>
</html>
